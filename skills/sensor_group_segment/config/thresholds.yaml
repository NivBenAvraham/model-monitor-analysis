
metrics:

  sensor_group_segment:
    # Phase 1 — valid sensor ranges (inherited from temperature_data_export_package preprocessing)
    zscore_threshold: 3
    temp_range_min: -30
    temp_range_max: 100
    ambient_temp_range_min: -30
    ambient_temp_range_max: 100

    # Phase 2 — grading thresholds
    # Target: hive_size_bucket (Layer 1 target — not valid/invalid labels).
    # Calibrated from 297,196 sensor-day rows across 423 train samples (50 groups, Feb–Mar 2026).
    # Strategy: p90/p10 of each hive size's own distribution.
    #   MAX thresholds = size p90 — above this, only 10% of correctly-labeled sensors appear.
    #   MIN thresholds = size p10 — below this, only 10% of correctly-labeled sensors appear.
    # Derived via: skills/sensor_group_segment/scripts/calibrate_thresholds.py
    # Full distributions: data/calibration/calibration_report.csv
    grading:
      large:
        std_dev_max: 0.603      # large p90 — above → unusually volatile for a large hive
        corr_max: 0.737         # large p90 — above → unusually coupled to ambient for large
        comfort_min: 95.833     # large p10 — below → unusually out of brood zone for large
      medium:
        mean_temp_min: 24.946   # medium p10 — below → unusually cold for a medium hive
      small:
        std_dev_min: 1.195      # small p10 — below → suspiciously stable for a small hive

decision:
  # Populated once decision rules are defined.
  # Will map metric results → ModelHealth: VALID / NEEDS_CALIBRATION / INVALID
